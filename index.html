<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vendor Application Management</title>

    <link rel="stylesheet" href="styles.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>

  <body>
    <div class="page">
      <header class="page-header">
        <div>
          <p class="eyebrow">Event Management</p>
          <h1>Vendor Application Management</h1>
          <p class="subtext">
            Review, search, and manage vendor submissions for upcoming events.
          </p>
        </div>
      </header>

      <!-- TOOLBAR -->

      <section class="toolbar">
        <div class="search-group">
          <label for="searchInput" class="sr-only">Search vendors</label>

          <div class="search-input-wrapper">
            <span class="search-icon">🔍</span>

            <input
              id="searchInput"
              type="text"
              placeholder="Search vendors, applicants, tags..."
              aria-label="Search vendor applications"
            />

            <button
              id="clearSearch"
              class="clear-search-btn hidden"
              type="button"
              aria-label="Clear search"
            >
              ✕
            </button>
          </div>
        </div>

        <div class="filter-wrap">
          <button
            id="filterToggle"
            class="filter-btn"
            type="button"
            aria-expanded="false"
            aria-controls="filterPanel"
            aria-haspopup="dialog"
          >
            <span class="filter-btn-left">
              <span class="filter-icon" aria-hidden="true">☷</span>
              <span>Filter</span>
            </span>
            <span id="filterChevron" class="filter-chevron" aria-hidden="true"
              >⌄</span
            >
          </button>

          <div
            id="filterPanel"
            class="filter-panel hidden"
            role="dialog"
            aria-modal="false"
          >
            <div class="filter-panel-inner">
              <select id="applicationType" class="filter-select">
                <option value="">All applications</option>
                <option value="reviewed">Reviewed applications</option>
                <option value="submitted">Submitted applications</option>
              </select>

              <p>Status</p>

              <div class="checkbox-grid">
                <label class="checkbox-item">
                  <input
                    type="checkbox"
                    class="status-checkbox"
                    value="Awaiting decision"
                  />
                  Awaiting decision
                </label>

                <label class="checkbox-item">
                  <input
                    type="checkbox"
                    class="status-checkbox"
                    value="Approved"
                  />
                  Approved
                </label>

                <label class="checkbox-item">
                  <input
                    type="checkbox"
                    class="status-checkbox"
                    value="Waitlisted"
                  />
                  Waitlisted
                </label>

                <label class="checkbox-item">
                  <input
                    type="checkbox"
                    class="status-checkbox"
                    value="Rejected"
                  />
                  Rejected
                </label>
              </div>

              <p>Payment Status</p>

              <div class="checkbox-grid">
                <label class="checkbox-item">
                  <input
                    type="checkbox"
                    class="payment-checkbox"
                    value="Paid"
                  />
                  Paid
                </label>

                <label class="checkbox-item">
                  <input
                    type="checkbox"
                    class="payment-checkbox"
                    value="Not Paid"
                  />
                  Not Paid
                </label>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- TABLE CARD -->

      <section class="table-card">
        <div class="table-header">
          <h2>Applications</h2>

          <p id="resultsCount" class="muted-text"></p>
        </div>

        <!-- BULK ACTION BAR -->

        <div id="bulkActionBar" class="bulk-action-bar hidden">
          <div class="bulk-action-left">
            <span id="selectedCount">0 selected</span>
          </div>

          <div class="bulk-action-right">
            <button id="bulkApproveBtn" class="secondary-btn">Approve</button>

            <button id="bulkClearBtn" class="text-btn">Clear selection</button>
          </div>
        </div>

        <!-- LOADING STATE -->

        <div id="tableLoadingState" class="table-loading hidden">
          Loading applications...
        </div>

        <!-- TABLE -->

        <div class="table-wrapper desktop-table">
          <table>
            <thead>
              <tr>
                <th class="checkbox-col">
                  <input
                    id="selectAllRows"
                    type="checkbox"
                    aria-label="Select all"
                  />
                </th>

                <th>
                  <button
                    id="sortBusinessBtn"
                    class="sort-button"
                    type="button"
                  >
                    Business name ↑↓
                  </button>
                </th>

                <th>Tag</th>
                <th>Application</th>
                <th>Payment</th>
                <th>Status</th>
                <th>Date</th>
                <th>Action</th>
              </tr>
            </thead>

            <tbody id="applicationTableBody"></tbody>
          </table>
        </div>

        <!-- MOBILE CARDS -->

        <div id="mobileCards" class="mobile-cards"></div>

        <!-- PAGINATION -->

        <div class="pagination">
          <button class="page-arrow">‹</button>

          <button class="page-btn active">1</button>
          <button class="page-btn">2</button>
          <button class="page-btn">3</button>
          <button class="page-btn">4</button>
          <button class="page-btn">5</button>

          <button class="page-arrow">›</button>
        </div>
      </section>
    </div>

    <!-- MODAL -->

    <div id="detailsModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Application Details</h3>

          <button id="closeModal">✕</button>
        </div>

        <div id="modalBody"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
